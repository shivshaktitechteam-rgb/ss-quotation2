<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Challans</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f7f7f7; }
    .container { max-width:1200px; margin:20px auto; background:#fff; padding:16px; border-radius:12px; box-shadow:0 0 10px rgba(0,0,0,0.10); }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
    a { color:#0b5ed7; text-decoration:none; font-weight:800; }
    h1 { margin:0; font-size:20px; }

    .filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    input, select { padding:10px; border:1px solid #ccc; border-radius:10px; font-size:14px; }
    .btn { padding:10px 12px; border:none; border-radius:10px; cursor:pointer; font-size:13px; font-weight:800; }
    .btn-new { background:#16a34a; color:#fff; }
    .btn-refresh { background:#111827; color:#fff; }

    .table-wrap { overflow-x:auto; border:1px solid #eee; border-radius:12px; }
    table { width:100%; border-collapse:collapse; min-width:980px; }
    th, td { border:1px solid #ccc; padding:8px; font-size:13px; }
    th { background:#f0f0f0; text-align:center; white-space:nowrap; }
    td { white-space:nowrap; }
    td.right { text-align:right; }

    .tag { padding:4px 10px; border-radius:999px; font-weight:800; font-size:12px; display:inline-block; }
    .tDraft { background:#fff7ed; color:#9a3412; border:1px solid #fed7aa; }
    .tDispatched { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
    .tDelivered { background:#ecfdf5; color:#166534; border:1px solid #bbf7d0; }
    .tCancelled { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }

    @media (max-width: 820px) {
      .container { margin:0; border-radius:0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="index.html">Back</a>
      <h1>Challans</h1>
      <a class="btn btn-new" href="challan.html" style="text-decoration:none;display:inline-block;">+ New Challan</a>
    </div>

    <div class="filters">
      <input id="days" type="number" value="30" min="1" style="width:120px" />
      <select id="status">
        <option value="">All Status</option>
        <option value="Draft">Draft</option>
        <option value="Dispatched">Dispatched</option>
        <option value="Delivered">Delivered</option>
        <option value="Cancelled">Cancelled</option>
      </select>
      <button class="btn btn-refresh" id="btnRefresh" type="button">Refresh</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Challan No</th>
            <th>Quotation No</th>
            <th>Customer</th>
            <th>Total Qty</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Performance</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="api.js?v=challans_phase1"></script>
  <script>
    function esc(s){ return String(s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    function tagClass(st){
      if (st === "Delivered") return "tag tDelivered";
      if (st === "Dispatched") return "tag tDispatched";
      if (st === "Cancelled") return "tag tCancelled";
      return "tag tDraft";
    }

    async function load(){
      const days = parseInt(document.getElementById("days").value || "30", 10) || 30;
      const statusFilter = document.getElementById("status").value || "";
      const tbody = document.getElementById("tbody");
      tbody.innerHTML = "<tr><td colspan='9'>Loading...</td></tr>";

      try{
        const r = await apiGet({ action: "challans", days });
        const list = (r && r.ok && Array.isArray(r.data)) ? r.data : [];

        const filtered = statusFilter ? list.filter(x => String(x.status||"") === statusFilter) : list;

        if (!filtered.length){
          tbody.innerHTML = "<tr><td colspan='9'>No challans found</td></tr>";
          return;
        }

        tbody.innerHTML = filtered.map(x => `
          <tr>
            <td>${esc(x.date)}</td>
            <td><a href="challan.html?challanNo=${encodeURIComponent(x.challanNo)}">${esc(x.challanNo)}</a></td>
            <td>${esc(x.quotationNo || "")}</td>
            <td>${esc(x.customerName || "")}</td>
            <td class="right">${Number(x.totalQty||0).toFixed(2)}</td>
            <td class="right">${Number(x.grandTotal||x.itemsAmount||0).toFixed(2)}</td>
            <td><span class="${tagClass(x.status)}">${esc(x.status || "Draft")}</span></td>
            <td>${esc(x.performance || "")}</td>
            <td>
              <a href="challan.html?challanNo=${encodeURIComponent(x.challanNo)}">Open</a>
              &nbsp;|&nbsp;
              <a href="challan.html?challanNo=${encodeURIComponent(x.challanNo)}&print=1">Print</a>
            </td>
          </tr>
        `).join("");

      }catch(e){
        console.error(e);
        tbody.innerHTML = "<tr><td colspan='9'>Error loading challans</td></tr>";
      }
    }

    document.getElementById("btnRefresh").addEventListener("click", load);
    load();
  </script>
</body>
</html>
