<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Challans</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f7f7f7; }
    .container { max-width: 1200px; margin: 20px auto; background:#fff; padding:16px; border-radius:12px; box-shadow:0 0 10px rgba(0,0,0,.10); }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .back { color:#0b5ed7; text-decoration:none; font-size:14px; font-weight:800; }
    h1 { margin: 6px 0 12px; font-size: 22px; font-weight: 900; }

    .controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
    .controls input { padding:10px; border:1px solid #ccc; border-radius:12px; font-size:13px; flex:1; min-width: 220px; }
    .btn { padding:10px 14px; border:none; border-radius:12px; cursor:pointer; font-weight:900; font-size:13px; }
    .btn-primary { background:#16a34a; color:#fff; }
    .btn-refresh { background:#111827; color:#fff; }

    .tablewrap { overflow-x:auto; border-radius:12px; border:1px solid #e5e5e5; }
    table { width:100%; border-collapse:collapse; min-width: 1100px; }
    th, td { border:1px solid #ddd; padding:8px; font-size:13px; }
    th { background:#f3f4f6; text-align:center; white-space:nowrap; }
    td { background:#fff; }
    td.num { text-align:right; font-variant-numeric: tabular-nums; }
    td.center { text-align:center; }

    select, input[type="date"] { padding:8px; border:1px solid #ccc; border-radius:10px; font-size:13px; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .a { padding:8px 10px; border-radius:10px; background:#2563eb; color:#fff; text-decoration:none; font-weight:800; font-size:12px; }
    .a.grey { background:#6b7280; }
    .a.orange { background:#f59e0b; }
    .a.red { background:#b91c1c; }

    .toast { position:fixed; right:20px; bottom:20px; max-width:360px; padding:10px 14px;
      border-radius:10px; background:#16a34a; color:#fff; font-size:14px; line-height:1.4;
      box-shadow:0 8px 24px rgba(0,0,0,0.15); opacity:0; transform:translateY(10px);
      pointer-events:none; transition:opacity .18s ease, transform .18s ease; z-index:9999; }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.error { background:#b91c1c; }

    @media (max-width: 920px) {
      .container { margin:0; border-radius:0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="back" href="index.html">Back</a>
      <div style="font-size:14px;color:#666;font-weight:800">Challans</div>
      <button class="btn btn-refresh" id="btnReload" type="button">Refresh</button>
    </div>

    <h1>Challans / Dispatch</h1>

    <div class="controls">
      <input id="filter" placeholder="Search challan no / quotation no / customer..." />
      <button class="btn btn-primary" id="btnNew" type="button">+ New Challan</button>
    </div>

    <div class="tablewrap">
      <table>
        <thead>
          <tr>
            <th>Challan No</th>
            <th>Date</th>
            <th>Quotation</th>
            <th>Customer</th>
            <th class="num">Qty</th>
            <th class="num">Grand Total</th>
            <th>Status</th>
            <th>Performance</th>
            <th>Invoice</th>
            <th>Update Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div style="margin-top:10px;color:#6b7280;font-size:12px;">
      Tip: Create invoice only after challan is correct. Cancelled challans will not count in delivered qty.
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="api.js?v=20260316_01"></script>
  <script>
    function $(id){ return document.getElementById(id); }
    function todayISO(){ return new Date().toISOString().slice(0,10); }

    function notify(msg, isError=false, timeout=2600){
      const t = $("toast");
      t.textContent = msg;
      t.className = "toast show" + (isError ? " error" : "");
      clearTimeout(notify._timer);
      notify._timer = setTimeout(()=>{ t.className = "toast"; }, timeout);
    }

    function fmt2(n){
      const x = Number(n || 0);
      return (isFinite(x) ? x : 0).toFixed(2);
    }

    let allRows = [];

    function matchesFilter(row, q){
      if (!q) return true;
      const s = (row.challanNo + " " + row.quotationNo + " " + row.customerName + " " + (row.invoiceNo||"") + " " + (row.status||"")).toLowerCase();
      return s.includes(q);
    }

    function render(){
      const q = $("filter").value.trim().toLowerCase();
      const tbody = $("tbody");
      tbody.innerHTML = "";

      const rows = allRows.filter(r => matchesFilter(r, q));
      if (!rows.length){
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="11" class="center" style="padding:16px;color:#6b7280;">No challans found</td>`;
        tbody.appendChild(tr);
        return;
      }

      rows.forEach(r=>{
        const tr = document.createElement("tr");

        const invoiceText = r.invoiceNo ? r.invoiceNo : "";

        tr.innerHTML = `
          <td class="center"><a href="challan.html?challanNo=${encodeURIComponent(r.challanNo)}" style="font-weight:900;color:#2563eb;text-decoration:none;">${r.challanNo}</a></td>
          <td class="center">${r.date || ""}</td>
          <td class="center">${r.quotationNo || ""}</td>
          <td>${r.customerName || ""}</td>
          <td class="num">${Number(r.totalQty||0)}</td>
          <td class="num">${fmt2(r.grandTotal || 0)}</td>
          <td class="center">${r.status || ""}</td>
          <td class="center">${r.performance || ""}</td>
          <td class="center">${invoiceText}</td>
          <td class="center">
            <select class="st">
              <option value="Draft">Draft</option>
              <option value="Scheduled">Scheduled</option>
              <option value="Delivered">Delivered</option>
              <option value="Cancelled">Cancelled</option>
            </select>
            <div style="margin-top:6px;">
              <input class="ad" type="date" value="${r.actualDeliveryDate || ""}" style="width:140px;">
            </div>
          </td>
          <td>
            <div class="actions">
              <a class="a" href="challan.html?challanNo=${encodeURIComponent(r.challanNo)}">Open</a>
              <a class="a grey" target="_blank" href="challan.html?challanNo=${encodeURIComponent(r.challanNo)}&print=1">Print</a>
              ${(!r.invoiceNo && r.status !== "Cancelled") ? `<a class="a orange btnInv" href="javascript:void(0)">Create Invoice</a>` : `<span class="a grey">Invoice</span>`}
            </div>
          </td>
        `;

        const st = tr.querySelector("select.st");
        st.value = r.status || "Draft";

        const ad = tr.querySelector("input.ad");
        if (!ad.value && (r.status === "Delivered")) ad.value = todayISO();

        st.addEventListener("change", async ()=>{
          const newStatus = st.value;
          const actualDate = ad.value || (newStatus === "Delivered" ? todayISO() : "");
          try {
            const resp = await apiPost({ action:"updateDispatchStatus", challanNo: r.challanNo, status: newStatus, actualDeliveryDate: actualDate });
            if (!resp || !resp.ok) throw new Error((resp && resp.error) ? resp.error : "Update failed");
            notify("Status updated ✅");
            await load();
          } catch(e){
            console.error(e);
            notify("Update error: " + (e.message || e), true);
            st.value = r.status || "Draft";
          }
        });

        const invBtn = tr.querySelector(".btnInv");
        if (invBtn){
          invBtn.addEventListener("click", async ()=>{
            const invoiceDate = prompt("Invoice date (YYYY-MM-DD)", todayISO()) || "";
            if (!invoiceDate) return;

            try {
              const resp = await apiPost({ action:"convertChallanToInvoice", challanNo: r.challanNo, invoiceDate: invoiceDate });
              if (!resp || !resp.ok) throw new Error((resp && resp.error) ? resp.error : "Invoice creation failed");
              const inv = resp.data && resp.data.invoiceNo ? resp.data.invoiceNo : "";
              notify("Invoice created ✅ " + inv);
              await load();

              // If you have sale.html that shows invoice by invoiceNo, open it
              if (inv) {
                const openIt = confirm("Open invoice page now?");
                if (openIt) window.location.href = "sale.html?invoiceNo=" + encodeURIComponent(inv);
              }
            } catch(e){
              console.error(e);
              notify("Invoice error: " + (e.message || e), true);
            }
          });
        }

        tbody.appendChild(tr);
      });
    }

    async function load(){
      const r = await apiGet({ action:"challans", days:30 });
      if (!r || !r.ok) throw new Error((r && r.error) ? r.error : "Failed to load challans");
      allRows = Array.isArray(r.data) ? r.data : [];
      render();
    }

    $("filter").addEventListener("input", render);
    $("btnNew").addEventListener("click", ()=>{ window.location.href = "challan.html"; });
    $("btnReload").addEventListener("click", ()=>location.reload());

    (async function init(){
      try {
        await load();
      } catch(e){
        console.error(e);
        notify("Load failed: " + (e.message || e), true);
      }
    })();
  </script>
</body>
</html>
