<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dispatch</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .split{display:flex;gap:12px}
    .split > div{flex:1}
    @media(max-width:820px){.split{flex-direction:column}}
    .box{border:1px solid var(--border);border-radius:var(--radius);padding:12px;background:#fff}
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="index.html">Back</a>
      <div class="title">Dispatch (Challan Tracking)</div>
      <button class="btn ghost" onclick="loadDispatch()">Refresh</button>
    </div>

    <div class="split">
      <div class="box">
        <div class="sub">Invoice No</div>
        <select id="invoiceNo" class="input"></select>

        <div class="row" style="margin-top:10px">
          <div style="flex:1">
            <div class="sub">Scheduled Delivery</div>
            <input id="scheduled" class="input" type="date">
          </div>
          <div style="flex:1">
            <div class="sub">Status</div>
            <select id="status" class="input">
              <option>Draft</option>
              <option>Packed</option>
              <option>Dispatched</option>
              <option>InTransit</option>
              <option>Delivered</option>
              <option>Cancelled</option>
            </select>
          </div>
        </div>

        <div class="row" style="margin-top:10px">
          <input id="transporter" class="input" placeholder="Transporter">
          <input id="vehicle" class="input" placeholder="Vehicle No">
        </div>
        <div class="row" style="margin-top:10px">
          <input id="lrno" class="input" placeholder="LR No">
          <input id="notes" class="input" placeholder="Notes">
        </div>

        <div class="row" style="margin-top:10px">
          <button class="btn blue" onclick="createDispatch()">Create Dispatch</button>
        </div>

        <div class="sub" id="msg" style="margin-top:10px"></div>
      </div>

      <div class="box">
        <div class="sub">Recent Dispatches (Last 30 days)</div>
        <div class="desktop-only">
          <table class="table">
            <thead>
              <tr>
                <th>Challan</th><th>Invoice</th><th>Status</th><th>Scheduled</th><th>Actual</th><th>Perf</th><th>Update</th>
              </tr>
            </thead>
            <tbody id="dBody"></tbody>
          </table>
        </div>

        <div class="mobile-list" id="mDispatch" style="margin-top:12px;display:flex;flex-direction:column;gap:10px;"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Done</div>

  <script src="api.js"></script>
  <script src="app.js"></script>
  <script>
    let dispatchRows = [];

    async function loadInvoices(){
      try{
        const r = await apiGet({action:"invoices", days:"60"});
        if(!r || !r.ok) throw new Error(r && r.error ? r.error : "Failed");
        const list = Array.isArray(r.data) ? r.data : [];
        const sel = document.getElementById("invoiceNo");
        sel.innerHTML = "";
        list.forEach(x=>{
          const opt = document.createElement("option");
          opt.value = x.invoiceNo;
          opt.textContent = x.invoiceNo + " (" + (x.customerName||"") + ")";
          sel.appendChild(opt);
        });
        document.getElementById("scheduled").value = todayISO();
      }catch(e){
        console.error(e);
        notify("Invoice load error: " + e.message, false);
      }
    }

    async function createDispatch(){
      try{
        const invoiceNo = document.getElementById("invoiceNo").value;
        if(!invoiceNo) return notify("Select invoice", false);

        const payload = {
          invoiceNo: invoiceNo,
          scheduledDeliveryDate: document.getElementById("scheduled").value || "",
          status: document.getElementById("status").value || "Draft",
          transporter: document.getElementById("transporter").value || "",
          vehicleNo: document.getElementById("vehicle").value || "",
          lrNo: document.getElementById("lrno").value || "",
          notes: document.getElementById("notes").value || ""
        };

        const r = await apiPost({action:"createDispatchFromInvoice", payload:payload});
        if(!r || !r.ok) throw new Error(r && r.error ? r.error : "Failed");

        document.getElementById("msg").textContent = "Created challan: " + r.data.challanNo;
        notify("Dispatch created: " + r.data.challanNo);
        await loadDispatch();

      }catch(e){
        console.error(e);
        notify("Create error: " + e.message, false);
      }
    }

    async function loadDispatch(){
      try{
        const r = await apiGet({action:"dispatch", days:"30"});
        if(!r || !r.ok) throw new Error(r && r.error ? r.error : "Failed");
        dispatchRows = Array.isArray(r.data) ? r.data : [];
        render();
      }catch(e){
        console.error(e);
        notify("Dispatch load error: " + e.message, false);
      }
    }

    function render(){
      const tb = document.getElementById("dBody");
      tb.innerHTML = "";
      const ml = document.getElementById("mDispatch");
      ml.innerHTML = "";

      dispatchRows.forEach(r=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><b>${r.challanNo||""}</b><div class="sub">${r.date||""}</div></td>
          <td>${r.invoiceNo||""}</td>
          <td style="text-align:center"><span class="badge ${badgeClass(r.status)}">${r.status||""}</span></td>
          <td>${r.scheduledDeliveryDate||""}</td>
          <td>${r.actualDeliveryDate||""}</td>
          <td style="text-align:center"><span class="badge ${badgeClass(r.performance)}">${r.performance||""}</span></td>
          <td>
            <button class="btn ghost" onclick="markDelivered('${r.challanNo}')">Delivered</button>
          </td>
        `;
        tb.appendChild(tr);

        const div = document.createElement("div");
        div.className="card";
        div.innerHTML = `
          <div class="row" style="justify-content:space-between">
            <div><b>${r.challanNo||""}</b><div class="sub">${r.date||""}</div></div>
            <span class="badge ${badgeClass(r.performance)}">${r.performance||""}</span>
          </div>
          <div class="sub" style="margin-top:6px">Invoice: ${r.invoiceNo||""}</div>
          <div class="sub">Status: <b>${r.status||""}</b></div>
          <div class="sub">Scheduled: ${r.scheduledDeliveryDate||"-"} • Actual: ${r.actualDeliveryDate||"-"}</div>
          <div class="row" style="margin-top:10px">
            <button class="btn ghost" onclick="markDelivered('${r.challanNo}')">Mark Delivered</button>
          </div>
        `;
        ml.appendChild(div);
      });
    }

    async function markDelivered(challanNo){
      const actual = prompt("Actual delivery date (YYYY-MM-DD):", todayISO());
      if(actual === null) return;
      try{
        const r = await apiPost({action:"updateDispatchStatus", challanNo:challanNo, status:"Delivered", actualDeliveryDate:actual});
        if(!r || !r.ok) throw new Error(r && r.error ? r.error : "Failed");
        notify("Updated: " + challanNo + " Delivered");
        await loadDispatch();
      }catch(e){
        console.error(e);
        notify("Update error: " + e.message, false);
      }
    }

    loadInvoices();
    loadDispatch();
  </script>
</body>
</html>
